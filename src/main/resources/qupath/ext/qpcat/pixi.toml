[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = "3.11.*"
appose = ">=0.7.2"
numpy = ">=1.24.0,<2.0"
pandas = ">=2.0"
scipy = ">=1.10"
scikit-learn = ">=1.5"
igraph = ">=0.11"
leidenalg = ">=0.10"
umap-learn = ">=0.5.5"
numba = ">=0.59"
matplotlib-base = ">=3.7"
h5py = ">=3.0"
# PyTorch + torchvision via conda-forge for GPU support
# Required for foundation model feature extraction and zero-shot phenotyping
pytorch = ">=2.0.0"
torchvision = ">=0.15.0"
pillow = ">=10.0"

[pypi-dependencies]
scanpy = ">=1.10"
anndata = ">=0.10"
seaborn = ">=0.13"
squidpy = ">=1.4.0"
harmonypy = ">=0.0.9"
pybanksy = ">=1.3.4"
scikit-image = ">=0.21"
# Foundation model feature extraction and zero-shot phenotyping
# Inspired by LazySlide (Zheng et al. 2026, Nature Methods)
# Models downloaded on-demand from HuggingFace, not bundled
timm = ">=1.0.3"
open-clip-torch = ">=2.24.0"
huggingface-hub = ">=0.20.0"
